backend:
  name: github
  repo: geuldanj/miami-only-one
  branch: main

media_folder: "images"
public_folder: "/images"
locale: "fr"

collections:
  - name: "site"
    label: "Site"
    files:
      - name: "contenu"
        label: "Contenu du site"
        file: "content.json"
        format: "json"
        fields:
          - label: "Réglages généraux"
            name: "settings"
            widget: "object"
            fields:
              - label: "Photo & logo"
                name: "media"
                widget: "object"
                fields:
                  - { label: "Photo d'accueil", name: "heroImage", widget: "image" }
                  - { label: "Logo", name: "logo", widget: "image" }
              - label: "Tarifs (USD/nuit)"
                name: "pricing"
                widget: "object"
                fields:
                  - { label: "Tarif mi-saison", name: "baseMid", widget: "number", value_type: "int", min: 0 }
                  - { label: "Haute saison (hiver)", name: "baseWinter", widget: "number", value_type: "int", min: 0 }
                  - { label: "Basse saison (été)", name: "baseSummer", widget: "number", value_type: "int", min: 0 }
                  - { label: "Frais de ménage", name: "cleaning", widget: "number", value_type: "int", min: 0 }
                  - { label: "Late check-out", name: "lateCheckout", widget: "number", value_type: "int", min: 0 }
                  - { label: "Transfert aéroport", name: "transfer", widget: "number", value_type: "int", min: 0 }
                  - { label: "Remise dès 7 nuits (%)", name: "discount7Pct", widget: "number", value_type: "int", min: 0 }
                  - { label: "Remise dès 14 nuits (%)", name: "discount14Pct", widget: "number", value_type: "int", min: 0 }
              - label: "Coordonnées"
                name: "contact"
                widget: "object"
                fields:
                  - { label: "Téléphone (+1...)", name: "phone", widget: "string" }
                  - { label: "WhatsApp (chiffres)", name: "whatsapp", widget: "string" }
                  - { label: "Email", name: "email", widget: "string" }
              - { label: "Acompte (%)", name: "depositPct", widget: "number", value_type: "int", min: 0, max: 100 }
          - label: "SEO (par langue)"
            name: "seo"
            widget: "object"
            fields:
              - label: "Français"
                name: "fr"
                widget: "object"
                fields:
                  - { label: "Titre (balise title)", name: "title", widget: "string" }
                  - { label: "Meta description", name: "description", widget: "text" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Titre (balise title)", name: "title", widget: "string" }
                  - { label: "Meta description", name: "description", widget: "text" }
              - label: "Español"
                name: "es"
                widget: "object"
                fields:
                  - { label: "Titre (balise title)", name: "title", widget: "string" }
                  - { label: "Meta description", name: "description", widget: "text" }
          - label: "Textes du site (par langue)"
            name: "i18n"
            widget: "object"
            collapsed: true
            fields:
              - label: "Français"
                name: "fr"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "[Navigation] nav1", name: "nav1", widget: "string", required: false, hint: "Résidence" }
